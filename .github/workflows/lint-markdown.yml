name: Markdown Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Run markdownlint
        run: npx markdownlint-cli2 "docs/**/*.md" "#docs/.vitepress/dist/**" "#docs/.vitepress/cache/**"
        # Exit code 1 = lint errors found (workflow will fail and show you exactly
        # which files and lines have issues — click the workflow run in GitHub to see them).
        # Exit code 0 = all clear.