name: Dependency Security Audit

on:
  push:
    branches: [main]
  schedule:
    # Runs every Monday at 9:00 AM AEST (11:00 PM UTC Sunday).
    - cron: '0 23 * * 0'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Run security audit
        # --audit-level=high means the workflow only FAILS for high or critical
        # severity vulnerabilities. Low/moderate issues are reported but won't
        # block your push. For a static wiki this is the right threshold.
        run: npm audit --audit-level=high
        working-directory: docs